<head>

    <style>
        :root {
            --bg-gold: #D6AF66;
            --bg-dark: #1C1C1C;
            --bg-cyan: #D1E5E5;
            --accent-red: #C41E3A;
            --text-white: #FFFFFF;
            --text-dark: #1D1D1B;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-gold);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            position: relative;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        /* --- HEADER --- */
        .header {
            background-color: var(--bg-dark);
            color: var(--text-white);
            padding: 100px 20px;
            border-bottom: 8px solid var(--bg-gold);
        }

        .logo-box {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            /* Using the extracted logo screenshot path */
            background-image: url('file:///C:/Users/Code Ahumada/.gemini/antigravity/brain/1a37f561-ddf7-4e16-b7ac-098d01a6909d/header_and_cards_1777313638391.png');
            background-size: 300%;
            background-position: top center;
            border-radius: 50%;
        }

        .header h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 1rem;
            letter-spacing: 4px;
            color: var(--bg-gold);
            text-transform: uppercase;
            font-weight: 400;
        }

        /* --- CARDS SECTION --- */
        .cards-section {
            background-color: var(--bg-gold);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 60px 40px;
        }

        .action-card {
            background: white;
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .action-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .action-card h3 {
            font-size: 1.2rem;
            font-weight: 900;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        .action-card .icon-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        /* --- REUNIONES (SCHEDULE) --- */
        .reuniones {
            background-color: var(--bg-dark);
            color: var(--text-white);
            padding: 100px 20px;
        }

        .reuniones h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 50px;
            letter-spacing: 3px;
        }

        .reuniones-img {
            width: 100%;
            max-width: 900px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: var(--transition);
        }

        .reuniones-img:hover {
            transform: scale(1.02);
        }

        /* --- EXTIENDETE SECTION --- */
        .extiendete {
            background-color: var(--bg-cyan);
            padding: 120px 20px;
        }

        .extiendete-banner {
            width: 100%;
            max-width: 1000px;
            border-radius: 40px;
            margin-bottom: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .btn-red {
            background-color: var(--accent-red);
            color: white;
            padding: 24px 60px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.4rem;
            display: inline-block;
            box-shadow: 0 15px 30px rgba(196, 30, 58, 0.3);
            transition: var(--transition);
            text-transform: uppercase;
        }

        .btn-red:hover {
            transform: scale(1.1);
            background-color: #e00;
            box-shadow: 0 20px 40px rgba(196, 30, 58, 0.4);
        }

        /* --- PASTORES --- */
        .pastores {
            background-color: var(--bg-dark);
            padding: 120px 20px;
        }

        .pastores-img {
            width: 100%;
            max-width: 800px;
            border-radius: 40px;
            border: 2px solid var(--bg-gold);
        }

        /* --- VERSE --- */
        .verse-section {
            background-color: white;
            padding: 120px 20px;
        }

        .verse-img {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- FLOATING ELEMENTS --- */
        .wa-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #25d366;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: var(--transition);
            animation: pulse 2s infinite;
        }

        .wa-float:hover { transform: scale(1.1) rotate(15deg); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 25px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* --- REVEAL ON SCROLL --- */
        [data-reveal] {
            opacity: 0;
            transform: translateY(50px);
            transition: 1s all cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-reveal].active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- FOOTER --- */
        .footer {
            background-color: var(--bg-dark);
            color: var(--text-white);
            padding: 80px 20px;
            text-align: center;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            section { padding: 60px 20px; }
            .action-card { padding: 40px 20px; }
            .btn-red { font-size: 1.1rem; padding: 18px 40px; }
        }
    </style>
</head>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll("[data-reveal]");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 100;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
